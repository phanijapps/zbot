services:
  zbot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "18791:18791"
      - "18790:18790"
    volumes:
      - ${VAULT_PATH:-~/Documents/zbot}:/data/zbot
      - fastembed-cache:/root/.cache/fastembed
    environment:
      - RUST_LOG=warn
    restart: unless-stopped

volumes:
  fastembed-cache:
