<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer glow effect (subtle for light mode) -->
  <circle cx="256" cy="256" r="192" fill="url(#radGrad1Light)" opacity="0.1"/>
  
  <!-- Main zero ring -->
  <circle cx="256" cy="256" r="154" stroke="url(#grad1Light)" stroke-width="26" fill="none" stroke-linecap="round"/>
  
  <!-- Inner portal effect -->
  <circle cx="256" cy="256" r="115" fill="url(#radGrad2Light)" opacity="0.15"/>
  <circle cx="256" cy="256" r="90" fill="url(#radGrad3Light)" opacity="0.12"/>
  <circle cx="256" cy="256" r="64" fill="url(#radGrad4Light)" opacity="0.1"/>
  
  <!-- Center point -->
  <circle cx="256" cy="256" r="15" fill="#5b21b6"/>
  
  <!-- Minimal agent indicators -->
  <circle cx="256" cy="102" r="13" fill="#7c3aed" opacity="0.9"/>
  <circle cx="410" cy="256" r="13" fill="#059669" opacity="0.9"/>
  <circle cx="256" cy="410" r="13" fill="#db2777" opacity="0.9"/>
  <circle cx="102" cy="256" r="13" fill="#d97706" opacity="0.9"/>
  
  <defs>
    <linearGradient id="grad1Light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="radGrad1Light">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="radGrad2Light">
      <stop offset="0%" style="stop-color:#6d28d9;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="radGrad3Light">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="radGrad4Light">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </radialGradient>
  </defs>
</svg>