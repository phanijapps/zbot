[package]
name = "zero-stores-sqlite"
version = "0.1.0"
edition = "2021"

[dependencies]
zero-stores = { path = "../zero-stores" }
knowledge-graph = { path = "../../services/knowledge-graph" }
# `agent-runtime` brings in the `EmbeddingClient` trait used by
# `SqliteKgStore::reindex_embeddings`. Dep direction is acyclic:
# agent-runtime does not depend on zero-stores or zero-stores-sqlite.
agent-runtime = { path = "../../runtime/agent-runtime" }
# `gateway-database` exposes `KnowledgeDatabase` (the shared knowledge.db
# pool) which the reindex orchestration drives. Dep direction stays acyclic:
# gateway-database does not depend on zero-stores or zero-stores-sqlite.
gateway-database = { path = "../gateway-database" }
async-trait = { workspace = true }
tokio = { workspace = true, features = ["rt", "macros"] }
tracing = { workspace = true }
serde_json = { workspace = true }
rusqlite = { version = "0.32", features = ["bundled"] }

# Pre-staged for Task 4+ integration test fixtures (tests/fixtures/mod.rs)
[dev-dependencies]
tempfile = "3"
gateway-services = { path = "../../gateway/gateway-services" }
zero-stores-conformance = { path = "../zero-stores-conformance" }

[lints]
workspace = true
