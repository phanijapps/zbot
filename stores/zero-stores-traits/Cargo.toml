[package]
name = "zero-stores-traits"
version = "0.1.0"
edition = "2021"

# Tiny dependency-light crate that holds the `MemoryFactStore` trait and
# `SkillIndexRow`. Lives separately from `zero-stores` so consumers like
# `agent-tools` (which sit deep in the dep graph below `gateway-database`)
# can pull in the trait without inheriting `zero-stores`' transitive
# dependency on `knowledge-graph` (which loops back to `agent-tools` via
# `gateway-database -> agent-runtime`).
#
# The full `zero-stores` crate re-exports `MemoryFactStore` and
# `SkillIndexRow` from here, so the design's public surface
# (`zero_stores::MemoryFactStore`) is preserved for callers that already
# depend on `zero-stores`.

[dependencies]
async-trait = { workspace = true }
serde_json = { workspace = true }

[lints]
workspace = true
