# ============================================================================
# GATEWAY EXECUTION
# Agent execution engine for the AgentZero gateway
# ============================================================================

[package]
name = "gateway-execution"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Agent execution engine for the AgentZero gateway"

[dependencies]
# Internal crates
agent-runtime = { path = "../../runtime/agent-runtime" }
agent-tools = { path = "../../runtime/agent-tools" }
api-logs = { path = "../../services/api-logs" }
execution-state = { path = "../../services/execution-state" }
zero-core = { path = "../../framework/zero-core" }
gateway-events = { path = "../gateway-events" }
gateway-services = { path = "../gateway-services" }
gateway-connectors = { path = "../gateway-connectors" }
gateway-templates = { path = "../gateway-templates" }
gateway-bridge = { path = "../gateway-bridge" }
knowledge-graph = { path = "../../services/knowledge-graph" }
zero-stores = { path = "../../stores/zero-stores" }
zero-stores-sqlite = { path = "../../stores/zero-stores-sqlite" }
zero-stores-traits = { path = "../../stores/zero-stores-traits" }

# Async
tokio = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
tokio-stream = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }

# Error handling
anyhow = { workspace = true }

# Logging
tracing = { workspace = true }

# HTTP (for resource queries)
reqwest = { workspace = true }

# Compression
flate2 = "1"

# Database (direct queries in archiver)
rusqlite = { version = "0.32", features = ["bundled"] }

# Regex
regex = { workspace = true }

# Hashing (for ward artifact indexer content dedup)
sha2 = "0.10"

# Home directory resolution for $HOME/.agents/skills root.
dirs = "5"

# Utilities
uuid = { workspace = true }
chrono = { workspace = true }
indexmap = { workspace = true }

# Lock-free shared cell for late-bound config (model_registry set after
# ExecutionRunner::new() but read by pre-spawned background tasks).
arc-swap = "1"

[features]
## Expose test stubs (StubSessionInvoker) for integration tests and
## downstream crates that need to exercise the SessionInvoker seam
## without booting the full executor pipeline.
test-stubs = []

[dev-dependencies]
tempfile = "3"
tokio-test = "0.4"
filetime = "0.2"

[lints]
workspace = true
