<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* Default tokens (dark mode) */
    :root {
      --bg-base: #0a0f14;
      --bg-panel: #0f1519;
      --bg-hover: #151c22;
      --border-dim: #1e293b;
      --border-focus: #05AD98;
      --text-primary: #e2e8f0;
      --text-muted: #475569;
      --accent-bg: #05AD98;
      --accent-text: #0a0f14;
      --positive: #05AD98;
      --negative: #E85D6C;
      --warning: #F5A623;
      --fault: #E85D6C;
      --neutral: #94a3b8;
      --extreme: #8B5CF6;
      --dislocation: #D946A8;
      --signal-deep: #048A7A;
      --signal-strong: #0FCFB5;
      --signal-core: #05AD98;
      --text-secondary: #94a3b8;
      --extreme: #8B5CF6;
    }

    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) {
        --bg-base: #FFFFFF;
        --bg-panel: #FFFFFF;
        --bg-hover: #f1f5f9;
        --border-dim: #BBBFBF;
        --border-focus: #05AD98;
        --text-primary: #000000;
        --text-muted: #878787;
        --accent-bg: #05AD98;
        --accent-text: #FFFFFF;
        --positive: #048A7A;
        --negative: #D4183D;
        --warning: #D4910A;
        --fault: #D4183D;
        --neutral: #878787;
        --extreme: #7C3AED;
        --dislocation: #C026A0;
        --signal-deep: #037066;
        --signal-strong: #048A7A;
        --signal-core: #05AD98;
        --text-secondary: #636363;
        --extreme: #7C3AED;
      }
    }

    [data-theme="light"] {
      --bg-base: #FFFFFF;
      --bg-panel: #FFFFFF;
      --bg-hover: #f1f5f9;
      --border-dim: #BBBFBF;
      --border-focus: #05AD98;
      --text-primary: #000000;
      --text-muted: #878787;
      --accent-bg: #05AD98;
      --accent-text: #FFFFFF;
      --positive: #048A7A;
      --negative: #D4183D;
      --warning: #D4910A;
      --fault: #D4183D;
      --neutral: #878787;
      --extreme: #7C3AED;
      --dislocation: #C026A0;
      --signal-deep: #037066;
      --signal-strong: #048A7A;
      --signal-core: #05AD98;
      --text-secondary: #636363;
      --extreme: #7C3AED;
    }

    [data-theme="dark"] {
      --bg-base: #0a0f14;
      --bg-panel: #0f1519;
      --bg-hover: #151c22;
      --border-dim: #1e293b;
      --border-focus: #05AD98;
      --text-primary: #e2e8f0;
      --text-muted: #475569;
      --accent-bg: #05AD98;
      --accent-text: #0a0f14;
      --positive: #05AD98;
      --negative: #E85D6C;
      --warning: #F5A623;
      --fault: #E85D6C;
      --neutral: #94a3b8;
      --extreme: #8B5CF6;
      --dislocation: #D946A8;
      --signal-deep: #048A7A;
      --signal-strong: #0FCFB5;
      --signal-core: #05AD98;
      --text-secondary: #94a3b8;
      --extreme: #8B5CF6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      background: var(--bg-base);
      color: var(--text-primary);
    }

    /* Typography utility classes (brand spec: Inter for UI, IBM Plex Mono for numeric/telemetry) */
    .text-mono { font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace; }
    .text-sans { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    td, .metric-value, .metric-change { font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace; }


    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      border-bottom: 1px solid var(--border-dim);
      padding-bottom: 16px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .title {
      font-size: 14px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .subtitle {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .timestamp {
      font-size: 11px;
      color: var(--text-muted);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

    @media (max-width: 768px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }

    /* Panels */
    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border-dim);
      margin-bottom: 16px;
      border-radius: 4px;
    }

    .panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-dim);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-body {
      padding: 16px;
    }

    /* Metrics Grid */
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1px;
      background: var(--border-dim);
      border: 1px solid var(--border-dim);
      margin-bottom: 24px;
      border-radius: 4px;
    }

    .metric {
      background: var(--bg-panel);
      padding: 16px;
    }

    .metric-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 24px;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .metric-change {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border-dim);
    }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-align: left;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-dim);
      position: sticky;
      top: 0;
      background: var(--bg-panel);
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-dim);
    }

    tr:hover { background: var(--bg-hover); }
    tr.highlight { background: var(--bg-hover); }

    /* Text */
    .text-right { text-align: right; }
    .text-center { text-align: center; }
    .text-muted { color: var(--text-muted); }
    .text-positive { color: var(--positive); }
    .text-negative { color: var(--negative); }
    .text-warning { color: var(--warning); }
    .text-info { color: var(--extreme); }

    /* Pills */
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border: 1px solid var(--border-dim);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-radius: 999px;
      }

    .pill-positive { background: var(--positive); color: #000; border-color: var(--positive); }
    .pill-negative { background: var(--negative); color: #FFF; border-color: var(--negative); }
    .pill-warning { background: var(--warning); color: #000; border-color: var(--warning); }

    /* CRI-specific: Score Display */
    .cri-score-display {
      text-align: center;
      padding: 32px 16px;
    }

    .cri-score-number {
      font-size: 72px;
      font-weight: 600;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .cri-score-max {
      font-size: 24px;
      color: var(--text-muted);
    }

    .cri-score-level {
      font-size: 14px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-top: 8px;
    }

    .cri-bar {
      height: 12px;
      background: var(--border-dim);
      width: 100%;
      margin-top: 16px;
    }

    .cri-bar-fill {
      height: 100%;
      transition: width 0.3s ease;
    }

    .cri-bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* CRI-specific: Component Bars */
    .component-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
    }

    .component-label {
      width: 120px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-muted);
    }

    .component-bar {
      flex: 1;
      height: 12px;
      background: var(--border-dim);
    }

    .component-bar-fill {
      height: 100%;
    }

    .component-score {
      width: 60px;
      text-align: right;
      font-weight: 500;
    }

    /* CRI-specific: Gauge */
    .gauge-container {
      width: 100%;
      height: 16px;
      background: var(--border-dim);
    }

    .gauge-fill {
      height: 100%;
    }

    .gauge-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Callouts */
    .callout {
      background: var(--bg-hover);
      border-left: 3px solid var(--accent-bg);
      padding: 16px;
      margin: 16px 0;
      border-radius: 4px;
    }

    .callout-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .callout.positive { border-left-color: var(--positive); }
    .callout.negative { border-left-color: var(--negative); }
    .callout.warning { border-left-color: var(--warning); }

    .section-header {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-dim);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border-dim);
      margin: 32px 0;
    }

    .footer {
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid var(--border-dim);
      color: var(--text-muted);
      font-size: 11px;
    }

    .footer a { color: var(--text-muted); }

    /* Bar fills */
    .bar-container {
      width: 100px;
      height: 8px;
      background: var(--border-dim);
      display: inline-block;
      vertical-align: middle;
    }

    .bar-fill { height: 100%; background: var(--accent-bg); }
    .bar-fill.positive { background: var(--positive); }
    .bar-fill.negative { background: var(--negative); }

    /* Theme toggle */
    .theme-toggle {
      background: transparent;
      border: 1px solid var(--border-dim);
      color: var(--text-primary);
      padding: 4px 12px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
    }

    .theme-toggle:hover {
      background: var(--bg-hover);
      border-color: var(--border-focus);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--border-focus); }

    @media print {
      body { background: white; color: black; }
      .theme-toggle { display: none; }
      .panel { border-color: #ccc;
      border-radius: 4px;
    }
    }
  </style>
</head>
<body>
  <div class="container">
    {{BODY}}
  </div>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const currentTheme = html.dataset.theme;
      if (currentTheme) {
        html.dataset.theme = currentTheme === 'dark' ? 'light' : 'dark';
      } else {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        html.dataset.theme = prefersDark ? 'light' : 'dark';
      }
      updateToggleIcon();
    }

    function updateToggleIcon() {
      const btn = document.querySelector('.theme-toggle');
      if (!btn) return;
      const isDark = document.documentElement.dataset.theme === 'dark' ||
        (!document.documentElement.dataset.theme &&
         window.matchMedia('(prefers-color-scheme: dark)').matches);
      btn.textContent = isDark ? '\u2600 LIGHT' : '\u25D0 DARK';
    }

    document.addEventListener('DOMContentLoaded', updateToggleIcon);
  </script>
</body>
</html>
