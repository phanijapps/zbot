# ============================================================================
# GATEWAY SERVICES
# Config-based services for agents, providers, MCP, skills, and settings
# ============================================================================

[package]
name = "gateway-services"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Config-based services for the AgentZero gateway"

[dependencies]
# Internal crates (for shared config types)
zero-core = { path = "../../framework/zero-core" }
agent-runtime = { path = "../../runtime/agent-runtime" }
agent-tools = { path = "../../runtime/agent-tools" }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }

# Async
tokio = { workspace = true }
async-trait = { workspace = true }

# Logging
tracing = { workspace = true }

# HTTP client (for provider health checks + Ollama NDJSON stream)
reqwest = { workspace = true }

# Streams for Ollama pull NDJSON parsing
futures = { workspace = true }

# Utilities
uuid = { workspace = true }
chrono = { workspace = true }
regex = "1"
thiserror = { workspace = true }
parking_lot = "0.12"
arc-swap = "1"

# File watching for hot-reload
notify = "7"
notify-debouncer-full = "0.4"

[dev-dependencies]
tempfile = "3"
tokio-test = "0.4"
httpmock = "0.7"

[lints]
workspace = true
