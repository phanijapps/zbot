[package]
name = "knowledge-graph"
version = "0.1.0"
edition = "2021"

[dependencies]
# Async runtime
tokio = { workspace = true }

# UUID generation
uuid = { workspace = true }

# Database
rusqlite = { version = "0.32", features = ["bundled"] }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Date handling
chrono = { workspace = true }

# Error handling
thiserror = { workspace = true }

# Regex for entity extraction
regex = { workspace = true }

# Logging
tracing = "0.1"

# LLM integration for smart extraction
zero-app = { path = "../../framework/zero-app" }

[dev-dependencies]
tempfile = "3"
