sonar.projectKey=phanijapps_zbot
sonar.organization=phanijapps

# Sources
sonar.sources=apps/ui/src,gateway,runtime,services,framework
# gateway/templates/** is distributed skill content (HTML reports, agent
# prompts, skill scripts) — intentional per-template duplication is a feature
# of the skill contract, not a maintenance bug. See docs/superpowers/plans/
# 2026-04-20-sonar-maintainability-cleanup.md Phase 3 for the decision log.
sonar.exclusions=**/node_modules/**,**/target/**,**/dist/**,**/*.test.*,**/test/**,gateway/templates/**,**/*.sql

# Coverage (LCOV format)
sonar.rust.lcov.reportPaths=rust-lcov.info
sonar.typescript.lcov.reportPaths=apps/ui/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

sonar.javascript.node.maxspace=4096