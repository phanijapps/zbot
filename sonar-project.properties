sonar.projectKey=phanijapps_zbot
sonar.organization=phanijapps

# Sources
sonar.sources=apps/ui/src,gateway,runtime,services,framework
# gateway/templates/** is distributed skill content (HTML reports, agent
# prompts, skill scripts) — intentional per-template duplication is a feature
# of the skill contract, not a maintenance bug. See docs/superpowers/plans/
# 2026-04-20-sonar-maintainability-cleanup.md Phase 3 for the decision log.
sonar.exclusions=**/node_modules/**,**/target/**,**/dist/**,**/*.test.*,**/test/**,**/tests/**,gateway/templates/**,**/*.sql

# Coverage (LCOV format)
sonar.rust.lcov.reportPaths=rust-lcov.info
sonar.typescript.lcov.reportPaths=apps/ui/coverage/lcov.info

# Coverage exclusions — files we deliberately skip from the coverage gate
# because they require integration-level testing (real subprocesses, HTTP,
# global tracing init). Mirrors the --ignore-filename-regex argument in
# both .github/workflows/sonarqube.yml and .github/workflows/test.yml.
#
# Gateway exclusions: server.rs (daemon bootstrap + axum router wiring),
# services/runtime.rs (full AppState wiring), websocket/** (full WS
# lifecycle requires a real client), and the thin axum HTTP handlers
# (http/{artifacts,bridge,chat,…}.rs). The latter are exercised end-to-end
# by gateway/tests/api_tests.rs and friends, not by per-handler unit
# tests — the testable business logic for those surfaces lives in the
# services they delegate to.
sonar.coverage.exclusions=runtime/agent-runtime/src/mcp/stdio.rs,runtime/agent-runtime/src/mcp/http.rs,runtime/agent-runtime/src/mcp/sse.rs,runtime/agent-runtime/src/mcp/manager.rs,runtime/agent-runtime/src/logging.rs,gateway/src/server.rs,gateway/src/services/runtime.rs,gateway/src/websocket/**,gateway/src/http/artifacts.rs,gateway/src/http/bridge.rs,gateway/src/http/chat.rs,gateway/src/http/connectors.rs,gateway/src/http/cron.rs,gateway/src/http/embeddings.rs,gateway/src/http/events.rs,gateway/src/http/graph.rs,gateway/src/http/ingest.rs,gateway/src/http/mcps.rs,gateway/src/http/memory.rs,gateway/src/http/models.rs,gateway/src/http/network.rs,gateway/src/http/openapi.rs,gateway/src/http/plugins.rs,gateway/src/http/providers.rs,gateway/src/http/sessions.rs,gateway/src/http/settings.rs,gateway/src/http/setup.rs,gateway/src/http/skills.rs,gateway/src/http/tools.rs,gateway/src/http/upload.rs,gateway/src/http/ward_actions.rs,gateway/src/http/webhooks.rs

# Encoding
sonar.sourceEncoding=UTF-8

sonar.javascript.node.maxspace=4096