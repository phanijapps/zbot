sonar.projectKey=phanijapps_zbot
sonar.organization=phanijapps

# Sources
sonar.sources=apps/ui/src,gateway,runtime,services,framework
sonar.exclusions=**/node_modules/**,**/target/**,**/dist/**,**/*.test.*,**/test/**

# Test coverage (LCOV format — works for both Rust and TypeScript)
sonar.coverageReportPaths=rust-lcov.info
sonar.typescript.lcov.reportPaths=apps/ui/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
