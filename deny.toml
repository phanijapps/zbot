# ============================================================================
# CARGO-DENY CONFIGURATION
# ============================================================================
# Configuration for cargo-deny to check dependencies for licenses,
# advisories, bans, and sources.
#
# Usage: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/
# ============================================================================

# ---------------------------------------------------------------------------
# ADVISORIES
# Security vulnerability checks from RustSec advisory database
# ---------------------------------------------------------------------------
[advisories]
# The path where the advisory database is cloned/fetched from
db-path = "~/.cargo/advisory-db"
# The URL(s) of the advisory databases to use
db-urls = ["https://github.com/rustsec/advisory-db"]
# Check unmaintained advisories across the full graph.
unmaintained = "all"
# A list of advisory IDs to ignore (USE WITH CAUTION)
ignore = [
    # Existing transitive dev/test dependency via httpmock -> async-object-pool.
    "RUSTSEC-2025-0052",
    # Existing transitive fastembed/image dependency via ravif -> rav1e -> bitstream-io.
    "RUSTSEC-2026-0105",
    # Existing transitive gateway-services file-watch dependency via notify.
    "RUSTSEC-2024-0384",
    # Existing transitive fastembed/hf-hub progress dependency via indicatif.
    "RUSTSEC-2025-0119",
    # Existing transitive fastembed/tokenizers macro dependency.
    "RUSTSEC-2024-0436",
]

# ---------------------------------------------------------------------------
# LICENSES
# License compliance checking
# ---------------------------------------------------------------------------
[licenses]
# List of explicitly allowed licenses
# See https://spdx.org/licenses/ for full list
allow = [
    # Permissive OSI-approved licenses (recommended for enterprise)
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "0BSD",
    "ISC",
    "NCSA",
    "CDLA-Permissive-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",

    # Public domain / CC0
    "Unlicense",
    "CC0-1.0",

    # Weak copyleft (may require source disclosure)
    "LGPL-2.1",
    "LGPL-3.0",
    "MPL-2.0",

    # OpenSSL linking exception (common for crypto libraries)
    "OpenSSL",
]

# Confidence threshold for license text detection (0.0-1.0)
confidence-threshold = 0.8

# Allow exceptions for specific crates (USE WITH CAUTION)
[[licenses.clarify]]
# The name of the crate to clarify
crate = "ring"
# The SPDX expression for the license requirements
expression = "MIT AND ISC AND OpenSSL"
# One or more files in the crate's source used as the "source of truth"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[licenses.private]
ignore = true

# ---------------------------------------------------------------------------
# BANS
# Check for duplicate crate versions, private registry crates, etc.
# ---------------------------------------------------------------------------
[bans]
# Lint level for multiple versions of the same crate
multiple-versions = "warn"
# Graph dependency tree used when detecting duplicate versions
wildcards = "allow"
# Certain crates/versions that will be skipped when doing duplicate detection
skip = [
    # Uncomment to skip specific duplicate version warnings
    # { name = "ansi_term", version = "=0.11.0" },
]
# Specifically allowed duplicate crates
allow = [
    # Uncomment to allow specific duplicates
    # { name = "strsim", version = "=0.10.0" },
]

# ---------------------------------------------------------------------------
# SOURCES
# Verify crates are from trusted sources
# ---------------------------------------------------------------------------
[sources]
# Lint level for crates from unknown registries
unknown-registry = "deny"
# Lint level for crates from unknown git sources
unknown-git = "deny"
# List of URLs for allowed crate registries
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# List of allowed git repositories
allow-git = [
    "https://github.com/0xplaygrounds/rig",
]

# ---------------------------------------------------------------------------
# FEATURE FLAGS (optional)
# Monitor for crates with large feature trees
# ---------------------------------------------------------------------------
# [features]
# Lint level for features with large dependency trees
# max-features = 100
