name: Release on main

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-on-main
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Compute today's CalVer
        id: version
        shell: bash
        run: |
          set -euo pipefail

          TODAY="$(date -u +%Y.%-m.%-d)"
          TAG="v${TODAY}"
          CURRENT="$(
            awk '
              /^\[workspace\.package\]$/ { in_section=1; next }
              /^\[/ && in_section { exit }
              in_section && /^version[[:space:]]*=/ {
                match($0, /"[^"]+"/)
                if (RSTART > 0) {
                  print substr($0, RSTART + 1, RLENGTH - 2)
                  exit
                }
              }
            ' Cargo.toml
          )"

          if [[ -z "${CURRENT}" ]]; then
            echo "::error::Could not read [workspace.package] version from Cargo.toml"
            exit 1
          fi

          echo "today=${TODAY}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "current=${CURRENT}" >> "${GITHUB_OUTPUT}"

          if [[ "${CURRENT}" == "${TODAY}" ]]; then
            echo "skip=1" >> "${GITHUB_OUTPUT}"
            echo "Already at ${TODAY}; no release bump needed."
          else
            echo "skip=0" >> "${GITHUB_OUTPUT}"
            echo "Bumping ${CURRENT} -> ${TODAY}"
          fi

      - name: Ensure release tag does not already exist
        if: steps.version.outputs.skip == '0'
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "::error::Release tag already exists: ${TAG}"
            exit 1
          fi

      - name: Setup Node
        if: steps.version.outputs.skip == '0'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/ui/package-lock.json

      - name: Setup Rust
        if: steps.version.outputs.skip == '0'
        uses: dtolnay/rust-toolchain@stable

      - name: Bump version files
        if: steps.version.outputs.skip == '0'
        shell: bash
        env:
          TODAY: ${{ steps.version.outputs.today }}
        run: |
          set -euo pipefail

          awk -v ver="${TODAY}" '
            BEGIN { in_section=0; done=0 }
            /^\[workspace\.package\]$/ { in_section=1; print; next }
            /^\[/ && in_section { in_section=0 }
            in_section && !done && /^version[[:space:]]*=/ {
              sub(/"[^"]+"/, "\"" ver "\"")
              done=1
            }
            { print }
            END {
              if (!done) {
                exit 42
              }
            }
          ' Cargo.toml > Cargo.toml.new || {
            echo "::error::Could not update [workspace.package] version in Cargo.toml"
            rm -f Cargo.toml.new
            exit 1
          }
          mv Cargo.toml.new Cargo.toml

          npm --prefix apps/ui version "${TODAY}" \
            --no-git-tag-version \
            --allow-same-version

      - name: Verify bumped repository
        if: steps.version.outputs.skip == '0'
        shell: bash
        env:
          TODAY: ${{ steps.version.outputs.today }}
        run: |
          set -euo pipefail
          cargo metadata --no-deps --format-version 1 >/tmp/zbot-cargo-metadata.json

          node <<'NODE'
          const fs = require("fs");

          const expected = process.env.TODAY;
          const cargo = fs.readFileSync("Cargo.toml", "utf8");
          const workspace = cargo.match(/\[workspace\.package\][\s\S]*?^version\s*=\s*"([^"]+)"/m);
          if (!workspace) {
            throw new Error("Could not read [workspace.package] version");
          }

          const pkg = JSON.parse(fs.readFileSync("apps/ui/package.json", "utf8"));
          const lock = JSON.parse(fs.readFileSync("apps/ui/package-lock.json", "utf8"));
          const lockRoot = lock.packages && lock.packages[""];

          const values = {
            cargo: workspace[1],
            packageJson: pkg.version,
            packageLock: lock.version,
            packageLockRoot: lockRoot && lockRoot.version,
          };

          for (const [name, value] of Object.entries(values)) {
            if (value !== expected) {
              throw new Error(`${name} version ${value} does not match ${expected}`);
            }
          }
          NODE

      - name: Commit release bump
        if: steps.version.outputs.skip == '0'
        shell: bash
        env:
          TODAY: ${{ steps.version.outputs.today }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml apps/ui/package.json apps/ui/package-lock.json
          git commit -m "release: ${TODAY}"

      - name: Tag release
        if: steps.version.outputs.skip == '0'
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
          TODAY: ${{ steps.version.outputs.today }}
        run: |
          set -euo pipefail
          git tag -a "${TAG}" -m "Release ${TODAY}"

      - name: Push release commit and tag
        if: steps.version.outputs.skip == '0'
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git push origin HEAD:main
          git push origin "${TAG}"

      - name: Dispatch release workflow
        if: steps.version.outputs.skip == '0'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/release.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"version\":\"${TAG}\"}}"
