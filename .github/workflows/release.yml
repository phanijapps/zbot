name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release, e.g. v2026.6.1'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/ui/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix apps/ui

      - name: Build dashboard
        run: npm run build --prefix apps/ui

      - name: Upload dashboard dist
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dist/

  build-linux:
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            archive: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            archive: linux-aarch64
            linker: aarch64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config gcc-aarch64-linux-gnu

      - name: Download dashboard dist
        uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: dist/

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: cargo build --release -p daemon -p cli --target ${{ matrix.target }}

      - name: Prepare release package
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          ROOT="zbot-${VERSION}"
          mkdir -p "package/${ROOT}/dist"
          cp "target/${{ matrix.target }}/release/zbotd" "package/${ROOT}/"
          cp "target/${{ matrix.target }}/release/zbot" "package/${ROOT}/"
          cp -R dist/. "package/${ROOT}/dist/"
          cp README.md "package/${ROOT}/"
          cp LICENSE "package/${ROOT}/"
          echo "${VERSION}" > "package/${ROOT}/VERSION"
          chmod +x "package/${ROOT}/zbotd" "package/${ROOT}/zbot"

      - name: Create archive
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          tar -czf "zbot-${VERSION}-${{ matrix.archive }}.tar.gz" -C package "zbot-${VERSION}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zbot-${{ matrix.archive }}
          path: zbot-*.tar.gz

  build-macos:
    needs: build-frontend
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            archive: macos-x86_64
          - target: aarch64-apple-darwin
            archive: macos-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Download dashboard dist
        uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: dist/

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p daemon -p cli --target ${{ matrix.target }}

      - name: Prepare release package
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          ROOT="zbot-${VERSION}"
          mkdir -p "package/${ROOT}/dist"
          cp "target/${{ matrix.target }}/release/zbotd" "package/${ROOT}/"
          cp "target/${{ matrix.target }}/release/zbot" "package/${ROOT}/"
          cp -R dist/. "package/${ROOT}/dist/"
          cp README.md "package/${ROOT}/"
          cp LICENSE "package/${ROOT}/"
          echo "${VERSION}" > "package/${ROOT}/VERSION"
          chmod +x "package/${ROOT}/zbotd" "package/${ROOT}/zbot"

      - name: Create archive
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          tar -czf "zbot-${VERSION}-${{ matrix.archive }}.tar.gz" -C package "zbot-${VERSION}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zbot-${{ matrix.archive }}
          path: zbot-*.tar.gz

  build-windows:
    needs: build-frontend
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            archive: windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Download dashboard dist
        uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: dist/

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p daemon -p cli --target ${{ matrix.target }}

      - name: Prepare release package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          ROOT="zbot-${VERSION}"
          mkdir -p "package/${ROOT}/dist"
          cp "target/${{ matrix.target }}/release/zbotd.exe" "package/${ROOT}/"
          cp "target/${{ matrix.target }}/release/zbot.exe" "package/${ROOT}/"
          cp -R dist/. "package/${ROOT}/dist/"
          cp README.md "package/${ROOT}/"
          cp LICENSE "package/${ROOT}/"
          echo "${VERSION}" > "package/${ROOT}/VERSION"

      - name: Create archive
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version || github.ref_name }}"
          Compress-Archive -Path "package/zbot-$version" -DestinationPath "zbot-$version-${{ matrix.archive }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zbot-${{ matrix.archive }}
          path: zbot-*.zip

  create-release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: zbot-*
          path: artifacts/
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd artifacts
          sha256sum zbot-* > checksums.sha256

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: zbot ${{ github.event.inputs.version || github.ref_name }}
          body: |
            ## zbot ${{ github.event.inputs.version || github.ref_name }}

            ### Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/phanijapps/zbot/main/scripts/install-release.sh | bash
            ```

            ```powershell
            irm https://raw.githubusercontent.com/phanijapps/zbot/main/scripts/install.ps1 | iex
            ```

            ### Downloads

            | Platform | Architecture | Artifact |
            | --- | --- | --- |
            | Linux | x86_64 | `zbot-*-linux-x86_64.tar.gz` |
            | Linux | ARM64 | `zbot-*-linux-aarch64.tar.gz` |
            | macOS | Intel | `zbot-*-macos-x86_64.tar.gz` |
            | macOS | Apple Silicon | `zbot-*-macos-aarch64.tar.gz` |
            | Windows | x86_64 | `zbot-*-windows-x86_64.zip` |

            Verify downloads with `checksums.sha256`.
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
