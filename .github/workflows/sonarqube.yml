name: SonarQube Analysis

on:
  push:
    branches: [main]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: [self-hosted, zbot]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install cargo-llvm-cov if not present (self-hosted runner may not have it)
      - name: Ensure cargo-llvm-cov is installed
        run: cargo llvm-cov --version || cargo install cargo-llvm-cov --locked

      - name: Generate Rust coverage (LCOV)
        # Excludes: agent-runtime MCP transports (stdio/http/sse/manager) drive real
        # subprocesses and HTTP — only covered by integration tests, not unit tests.
        # logging.rs registers a global tracing subscriber and is not unit-testable.
        # Gateway excludes: server.rs (daemon bootstrap), services/runtime.rs
        # (full AppState wiring), websocket/** (real-client lifecycle), and the
        # thin axum HTTP handler files (http/{artifacts,bridge,chat,…}.rs)
        # whose business logic lives in the services they delegate to. End-to-
        # end coverage for those handlers comes from gateway/tests/api_tests.rs
        # and friends, not per-handler unit tests.
        # Same regex is mirrored in `.github/workflows/test.yml` and
        # `sonar-project.properties` (sonar.coverage.exclusions).
        run: |
          cargo llvm-cov --workspace --lcov --output-path rust-lcov.info \
            --ignore-filename-regex '(runtime/agent-runtime/src/(mcp/(stdio|http|sse|manager)\.rs|logging\.rs)|gateway/src/(server\.rs|services/runtime\.rs|websocket/.*\.rs|http/(artifacts|bridge|chat|connectors|cron|embeddings|events|graph|ingest|mcps|memory|models|network|openapi|plugins|providers|sessions|settings|setup|skills|tools|upload|ward_actions|webhooks)\.rs))'

      - name: Install UI dependencies
        working-directory: apps/ui
        run: npm ci

      # A small set of UI tests is still flaky/broken (currently
      # App.test.tsx connection-pill assertion and a Connector-Inbound-Log
      # test in services/transport/http.test.ts). Vitest emits coverage
      # for passing tests regardless (`reportOnFailure: true` in
      # vitest.config.ts), but the process exits 1 — `continue-on-error`
      # keeps the Sonar scan from being skipped. Remove this once the
      # remaining failures are fixed.
      - name: Generate UI coverage (LCOV)
        working-directory: apps/ui
        continue-on-error: true
        run: npm run test:coverage

      # vitest emits SF: paths relative to apps/ui; rewrite to repo-root so
      # SonarCloud can match them against sonar.sources.
      - name: Rewrite UI LCOV paths to repo root
        run: sed -i 's|^SF:|SF:apps/ui/|' apps/ui/coverage/lcov.info

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
