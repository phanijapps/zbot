name: SonarQube Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: [self-hosted, zbot]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install cargo-llvm-cov if not present (self-hosted runner may not have it)
      - name: Ensure cargo-llvm-cov is installed
        run: cargo llvm-cov --version || cargo install cargo-llvm-cov --locked

      - name: Generate Rust coverage (LCOV)
        run: cargo llvm-cov --workspace --lcov --output-path rust-lcov.info || true

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
