name: SonarQube Analysis

on:
  push:
    branches: [main]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: [self-hosted, zbot]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install cargo-llvm-cov if not present (self-hosted runner may not have it)
      - name: Ensure cargo-llvm-cov is installed
        run: cargo llvm-cov --version || cargo install cargo-llvm-cov --locked

      - name: Generate Rust coverage (LCOV)
        run: cargo llvm-cov --workspace --lcov --output-path rust-lcov.info

      - name: Install UI dependencies
        working-directory: apps/ui
        run: npm ci

      # 24 pre-existing UI test failures live in dashboard.test.tsx,
      # http.test.ts, and SessionsList.test.tsx (tracked in
      # memory-bank/defects/ui_test_suite_broken_on_main.md). Vitest emits
      # coverage for the passing tests regardless (via reportOnFailure: true
      # in vitest.config.ts), but the process exits 1 — `continue-on-error`
      # keeps the Sonar scan from being skipped. Remove once the defect is fixed.
      - name: Generate UI coverage (LCOV)
        working-directory: apps/ui
        continue-on-error: true
        run: npm run test:coverage

      # vitest emits SF: paths relative to apps/ui; rewrite to repo-root so
      # SonarCloud can match them against sonar.sources.
      - name: Rewrite UI LCOV paths to repo root
        run: sed -i 's|^SF:|SF:apps/ui/|' apps/ui/coverage/lcov.info

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
