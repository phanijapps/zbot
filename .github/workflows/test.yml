name: Tests

# DISABLED: Uncomment the triggers below to enable automatic test runs
on:
  workflow_dispatch:  # Manual trigger only (enabled)
  # push:
  #   branches: [main, v*]
  # pull_request:
  #   branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast unit tests - run first
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run Rust unit tests
        run: cargo test --workspace --lib

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json

      - name: Install frontend deps
        run: cd apps/ui && npm ci

      - name: Run frontend unit tests
        run: cd apps/ui && npm test

  # Integration tests - run after unit tests pass
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run Rust integration tests
        run: cargo test --workspace

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json

      - name: Install frontend deps
        run: cd apps/ui && npm ci

      - name: Run frontend integration tests
        run: cd apps/ui && npm run test -- tests/integration/

  # E2E tests - run after integration tests
  e2e-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json

      - name: Install deps
        run: cd apps/ui && npm ci

      - name: Install Playwright
        run: cd apps/ui && npx playwright install --with-deps chromium

      - name: Build frontend
        run: cd apps/ui && npm run build

      - name: Run E2E tests (quick scenarios only)
        run: cd apps/ui && npm run test:e2e -- --grep-invert "long-running"
        env:
          CI: true

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/ui/playwright-report/
          retention-days: 7

  # Coverage report - optional, runs in parallel with integration tests
  coverage:
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 30
    continue-on-error: true  # Don't fail the whole workflow if coverage fails
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Run coverage
        run: cargo tarpaulin --workspace --out Xml --skip-clean

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: cobertura.xml
          fail_ci_if_error: false

  # Frontend coverage
  frontend-coverage:
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json

      - name: Install deps
        run: cd apps/ui && npm ci

      - name: Run coverage
        run: cd apps/ui && npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: apps/ui/coverage/lcov.info
          fail_ci_if_error: false
