name: Security checks

on:
  pull_request:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "23 6 * * 1" # Mondays 06:23 UTC (weekly)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    name: Rust + Node security scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- Rust ----------
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Rust fmt
        run: cargo fmt --all --check

      - name: Rust clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Rust dependency vulnerabilities (cargo audit)
        run: cargo audit

      # ---------- Node / React ----------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # If your package-lock.json is not at repo root, set cache-dependency-path below.
      # with:
      #   node-version: "20"
      #   cache: "npm"
      #   cache-dependency-path: "frontend/package-lock.json"

      - name: Install Node dependencies
        run: npm ci
        # If React lives in /frontend, change to:
        # working-directory: frontend

      - name: NPM audit (high+)
        run: npm audit --audit-level=high
        # If React lives in /frontend, change to:
        # working-directory: frontend

      # ---------- Secrets scanning ----------
      - name: Run Gitleaks (secrets scan)
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --verbose --redact
